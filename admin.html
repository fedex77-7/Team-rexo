<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEAM REXO | Admin Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #060709; color: #f1f5f9; padding: 20px; font-size: 0.88rem; }
        
        .admin-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 25px;
            max-width: 1000px;
            margin: 0 auto 30px auto;
        }

        h2 { font-family: 'Rajdhani', sans-serif; color: #00f0ff; letter-spacing: 1px; margin-bottom: 15px; font-size: 1.5rem; }
        h3 { font-family: 'Rajdhani', sans-serif; color: #7000ff; margin-top: 15px; margin-bottom: 10px; font-size: 1.2rem; }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 15px; }
        input {
            width: 100%;
            padding: 9px 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: #fff;
            font-size: 0.85rem;
        }
        input:focus { outline: none; border-color: #00f0ff; }

        .btn {
            padding: 9px 18px;
            border: none;
            border-radius: 6px;
            background: linear-gradient(135deg, #00f0ff, #7000ff);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            transition: 0.2s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-danger { background: linear-gradient(135deg, #ff0055, #990000); }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left; }
        th, td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 0.8rem; }
        th { color: #00f0ff; font-family: 'Rajdhani', sans-serif; font-size: 0.95rem; }
        tr:hover { background: rgba(255,255,255,0.02); }
    </style>
</head>
<body>

    <!-- Site Management -->
    <div class="admin-card">
        <h2>⚡ TEAM REXO ADMIN CONTROL PANEL</h2>
        
        <h3>1. Update Logo & Group Link</h3>
        <div class="form-grid">
            <input type="text" id="cfg-logo" placeholder="Logo Image URL">
            <input type="text" id="cfg-group" placeholder="Instagram Group Link">
        </div>

        <h3>2. Guild Leadership Links</h3>
        <p style="color:#64748b; margin-bottom:8px; font-size:0.75rem;">Leader Details</p>
        <div class="form-grid">
            <input type="text" id="lead-name" placeholder="Leader Name">
            <input type="text" id="lead-uid" placeholder="Leader UID">
            <input type="text" id="lead-dm" placeholder="Leader Insta DM Link">
        </div>

        <p style="color:#64748b; margin-bottom:8px; font-size:0.75rem;">Acting Leader Details</p>
        <div class="form-grid">
            <input type="text" id="act-name" placeholder="Acting Name">
            <input type="text" id="act-uid" placeholder="Acting UID">
            <input type="text" id="act-dm" placeholder="Acting Insta DM Link">
        </div>

        <p style="color:#64748b; margin-bottom:8px; font-size:0.75rem;">Officer / Elder Details</p>
        <div class="form-grid">
            <input type="text" id="eld-name" placeholder="Elder Name">
            <input type="text" id="eld-uid" placeholder="Elder UID">
            <input type="text" id="eld-dm" placeholder="Elder Insta DM Link">
        </div>

        <button class="btn" onclick="saveAdminData()">SAVE WEBSITE CHANGES</button>
    </div>

    <!-- Application Logs & Visitor Tracking -->
    <div class="admin-card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>📋 JOIN APPLICATIONS & VISITOR LOGS</h2>
            <button class="btn btn-danger" onclick="clearLogs()">CLEAR ALL LOGS</button>
        </div>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Date/Time</th>
                        <th>Player Name</th>
                        <th>FF UID</th>
                        <th>Email</th>
                        <th>Instagram Handle</th>
                        <th>IP Address</th>
                        <th>ISP/Network</th>
                    </tr>
                </thead>
                <tbody id="logs-table-body">
                    <!-- Logs injected via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function loadCurrentAdminData() {
            const data = JSON.parse(localStorage.getItem('rexoData')) || {};
            if(data.logo) document.getElementById('cfg-logo').value = data.logo;
            if(data.instaGroup) document.getElementById('cfg-group').value = data.instaGroup;

            if(data.leadership) {
                document.getElementById('lead-name').value = data.leadership.leader.name || '';
                document.getElementById('lead-uid').value = data.leadership.leader.uid || '';
                document.getElementById('lead-dm').value = data.leadership.leader.dm || '';

                document.getElementById('act-name').value = data.leadership.acting.name || '';
                document.getElementById('act-uid').value = data.leadership.acting.uid || '';
                document.getElementById('act-dm').value = data.leadership.acting.dm || '';

                document.getElementById('eld-name').value = data.leadership.elder.name || '';
                document.getElementById('eld-uid').value = data.leadership.elder.uid || '';
                document.getElementById('eld-dm').value = data.leadership.elder.dm || '';
            }

            renderLogs();
        }

        function saveAdminData() {
            const currentData = JSON.parse(localStorage.getItem('rexoData')) || {};

            currentData.logo = document.getElementById('cfg-logo').value;
            currentData.instaGroup = document.getElementById('cfg-group').value;

            currentData.leadership = {
                leader: {
                    name: document.getElementById('lead-name').value,
                    uid: document.getElementById('lead-uid').value,
                    dm: document.getElementById('lead-dm').value
                },
                acting: {
                    name: document.getElementById('act-name').value,
                    uid: document.getElementById('act-uid').value,
                    dm: document.getElementById('act-dm').value
                },
                elder: {
                    name: document.getElementById('eld-name').value,
                    uid: document.getElementById('eld-uid').value,
                    dm: document.getElementById('eld-dm').value
                }
            };

            localStorage.setItem('rexoData', JSON.stringify(currentData));
            alert("Website details updated successfully!");
        }

        function renderLogs() {
            const logs = JSON.parse(localStorage.getItem('rexoLogs')) || [];
            const tbody = document.getElementById('logs-table-body');
            tbody.innerHTML = '';

            if(logs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#64748b;">No join requests found yet.</td></tr>`;
                return;
            }

            logs.forEach(log => {
                tbody.innerHTML += `
                    <tr>
                        <td style="color:#64748b;">${log.date}</td>
                        <td style="color:#fff; font-weight:600;">${log.name}</td>
                        <td style="color:#00f0ff;">${log.uid}</td>
                        <td>${log.email}</td>
                        <td style="color:#ff00f0;">${log.insta || 'N/A'}</td>
                        <td><code>${log.ip}</code></td>
                        <td style="color:#94a3b8;">${log.isp}</td>
                    </tr>
                `;
            });
        }

        function clearLogs() {
            if(confirm("Are you sure you want to clear all join request logs?")) {
                localStorage.removeItem('rexoLogs');
                renderLogs();
            }
        }

        loadCurrentAdminData();
    </script>
</body>
</html>
